// COMPONENTS

function Tag({children, color=C.black}) {
  return <span style={{background:color+"0C", border:`1px solid ${color}22`, color, padding:"3px 10px", borderRadius:100, fontSize:11, fontWeight:500, fontFamily:B, whiteSpace:"nowrap"}}>{children}</span>;
}

function Label({children}) {
  return <div style={{fontSize:11, fontWeight:600, fontFamily:B, letterSpacing:"0.08em", color:C.gl, textTransform:"uppercase", marginBottom:8}}>{children}</div>;
}

      <div style={{marginBottom:20}}>

        <p style={{fontFamily:B, fontSize:13, color:C.gray, lineHeight:1.6, margin:0}}>Seven domains the system needs to cover. Each contains the workflows we've mapped, the systems involved, and our understanding of how the process works today.</p>
      </div>
      <div style={{display:"grid", gap:8}}>
        {DOMAINS.map(d=>{
          const isOpen = expanded === d.id;
          return (
            <div key={d.id} onClick={()=>setExpanded(isOpen?null:d.id)} style={{background:C.bg, border:`1px solid ${isOpen?d.color+"44":C.bd}`, borderRadius:12, padding:"16px 20px", cursor:"pointer", transition:"all 0.15s"}}>
              <div style={{display:"flex", alignItems:"center", gap:12}}>
                <div style={{width:36, height:36, borderRadius:8, background:d.bg, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:B, fontSize:11, fontWeight:700, color:d.color}}>{d.tag}</div>
                <div style={{flex:1}}>
                  <div style={{fontFamily:H, fontSize:17, color:C.black}}>{d.label}</div>
                  <div style={{display:"flex", gap:6, marginTop:4, flexWrap:"wrap"}}>
                    <Tag color={d.color}>{d.sopCount}</Tag>
                  </div>
                </div>
                <span style={{color:C.gl, fontSize:18, transform:isOpen?"rotate(90deg)":"none", transition:"transform 0.15s"}}>›</span>
              </div>
              {isOpen && (
                <div style={{marginTop:16, paddingTop:16, borderTop:`1px solid ${C.bd}`}}>
                  <Label>How It Works</Label>
                  <div style={{fontFamily:B, fontSize:12, color:C.dark, lineHeight:1.65, padding:"12px 16px", marginBottom:16, background:C.sf, borderRadius:8, borderLeft:`3px solid ${d.color}`}}>{d.overview}</div>
                  <Label>Workflows</Label>
                  <div style={{display:"grid", gap:6}}>
                    {d.workflows.map((wf,wi)=>(
                      <div key={wi} style={{background:C.sf, borderRadius:8, padding:"10px 14px", border:`1px solid ${C.bd}`}}>
                        <div style={{fontFamily:B, fontSize:12, fontWeight:600, color:C.black, marginBottom:4}}>{wf.name}</div>
                        <div style={{fontFamily:M, fontSize:10, color:C.gray, lineHeight:1.5}}>{wf.flow}</div>
                        <div style={{marginTop:5, display:"flex", alignItems:"center", gap:6}}>
                          <span style={{fontFamily:B, fontSize:9, fontWeight:600, color:C.gl, textTransform:"uppercase", letterSpacing:"0.06em"}}>Platforms:</span>
                          <span style={{fontFamily:M, fontSize:9, color:C.blue}}>{wf.platforms}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// SYSTEMS
// ═══════════════════════════════════════════

function SystemsView() {
  const p1 = SYSTEMS.filter(s=>s.phase===1);
  const p2 = SYSTEMS.filter(s=>s.phase===2);
  const renderSys = (s) => (
    <div key={s.name} style={{background:C.bg, border:`1px solid ${C.bd}`, borderRadius:10, padding:"14px 18px", marginBottom:8}}>
      <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:8}}>
        <span style={{fontFamily:H, fontSize:15, color:C.black}}>{s.name}</span>
        <Tag color={s.color}>{s.access}</Tag>
      </div>
      <div style={{display:"grid", gap:3}}>
        {s.items.map((item,i)=>(
          <div key={i} style={{display:"flex", gap:8, alignItems:"flex-start"}}>
            <span style={{color:s.color, fontSize:7, marginTop:5, flexShrink:0}}>●</span>
            <span style={{fontFamily:B, fontSize:11, color:C.gray, lineHeight:1.5}}>{item}</span>
          </div>
        ))}
      </div>
    </div>
  );
  return (
    <div>
      <div style={{marginBottom:20}}>
        <h2 style={{fontFamily:H, fontSize:24, color:C.black, fontWeight:400, margin:"0 0 8px"}}>Integration Landscape</h2>
        <p style={{fontFamily:B, fontSize:13, color:C.gray, lineHeight:1.6, margin:0}}>Phase 1 systems have direct API or vendor integration. Phase 2 systems require RPA, email proxy, or future API development.</p>
      </div>
      <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:10}}>
        <div style={{width:8, height:8, borderRadius:4, background:C.green}} />
        <span style={{fontFamily:B, fontSize:13, fontWeight:600, color:C.black}}>Phase 1 — Direct Access</span>
      </div>
      {p1.map(renderSys)}
      <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:10, marginTop:20}}>
        <div style={{width:8, height:8, borderRadius:4, background:C.amber}} />
        <span style={{fontFamily:B, fontSize:13, fontWeight:600, color:C.black}}>Phase 2 — Proxy / RPA / Deferred</span>
      </div>
      {p2.map(renderSys)}
    </div>
  );
}

// ═══════════════════════════════════════════
// ARCHITECTURE
// ═══════════════════════════════════════════

function ArchView() {
  const platform = [
    {name:"Ingestion", color:C.blue, desc:"All operational signals — email, voice, SMS, calendar, Monday.com — normalized into one event pipeline.", items:["3 Gmail inboxes via Pub/Sub", "Voice + SMS via vendor APIs", "Monday.com via REST API", "Google Calendar webhooks", "ProCare via RPA (Phase 2)"]},
    {name:"Classification", color:C.purple, desc:"One pipeline classifies every signal against the SOP registry. Urgency scoring, entity extraction, sentiment analysis, and action routing.", items:["SOP Registry: configurable per procedure", "LLM: classify, score, extract, route", "Tiers: Monitor / Assist / Automate"]},
    {name:"Compliance", color:C.red, desc:"Deadline tracker with countdown alerts, completion detection from upstream signals, and the VPK credit formula engine.", items:["DOE annual, ELC monthly, SUFS quarterly", "Staff training: 90d / 1yr from hire", "Monday.com compliance calendar sync", "VPK credit calculator"]},
    {name:"Intelligence", color:C.green, desc:"Founder Command Center, daily briefing, and internal alerting. The read and presentation layer that makes everything visible and actionable.", items:["Dashboard: urgency, compliance, HR, billing, parents", "6 AM daily briefing email", "Internal staff alerts", "Parent portal (website)", "Admin configuration interface"]},
  ];
  const employees = [
    {name:"BPI Receptionist", color:C.teal, reads:"Ingestion (voice, SMS) · Classification (intent routing) · Intelligence (knowledge base)", does:"Handles all parent-facing communication. Resolves routine queries, receives notifications, escalates to humans on request."},
    {name:"BPI Ops Intelligence", color:C.accent, reads:"Ingestion (email, calendar) · Classification (SOP mapping) · Compliance (deadlines) · Intelligence (dashboard, briefing)", does:"Monitors all internal operations. Classifies signals, tracks compliance, generates briefings, surfaces decisions for Rita."},
    {name:"BPI Orchestrator", color:C.blue, reads:"Classification (action routing) · Compliance (task triggers) · Intelligence (pipeline status)", does:"Manages workflows across Monday.com, billing cycles, enrollment pipelines, hiring, and scholarship tracking. Takes action on flagged items."},
  ];
  return (
    <div>
      <div style={{marginBottom:20}}>
        <h2 style={{fontFamily:H, fontSize:24, color:C.black, fontWeight:400, margin:"0 0 8px"}}>Solution Architecture</h2>
        <p style={{fontFamily:B, fontSize:13, color:C.gray, lineHeight:1.6, margin:0}}>
          Layers 1–4 are the platform — they ingest, classify, track, and present. The AI employees operate on top of this platform, each one reading from the layers below and taking actions in their domain.
        </p>
      </div>

      {/* Platform Layers */}
      <Label>Platform Layers (1–4)</Label>
      <div style={{display:"flex", alignItems:"center", gap:0, marginBottom:12}}>
        {platform.map((l,i)=>(
          <div key={i} style={{display:"flex", alignItems:"center", flex:1}}>
            <div style={{flex:1, background:l.color+"08", border:`1px solid ${l.color}22`, borderRadius:10, padding:"10px 8px", textAlign:"center"}}>
              <div style={{fontFamily:B, fontSize:9, fontWeight:600, color:l.color, letterSpacing:"0.06em"}}>LAYER {i+1}</div>
              <div style={{fontFamily:H, fontSize:12, color:C.black}}>{l.name}</div>
            </div>
            {i<3 && <span style={{color:C.bd, margin:"0 2px", fontSize:14}}>→</span>}
          </div>
        ))}
      </div>
      <div style={{display:"grid", gap:8, marginBottom:24}}>
        {platform.map((l,i)=>(
          <div key={i} style={{background:C.bg, border:`1px solid ${C.bd}`, borderRadius:10, padding:"14px 18px", borderLeft:`3px solid ${l.color}`}}>
            <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:6}}>
              <Tag color={l.color}>Layer {i+1}</Tag>
              <span style={{fontFamily:H, fontSize:15, color:C.black}}>{l.name}</span>
            </div>
            <div style={{fontFamily:B, fontSize:12, color:C.gray, lineHeight:1.5, marginBottom:8}}>{l.desc}</div>
            <div style={{display:"flex", flexWrap:"wrap", gap:4}}>
              {l.items.map((item,j)=>(
                <span key={j} style={{background:C.sf, border:`1px solid ${C.bd}`, borderRadius:6, padding:"4px 10px", fontFamily:B, fontSize:10, color:C.gray}}>{item}</span>
              ))}
            </div>
          </div>
        ))}
      </div>

      {/* Employee Layer */}
      <div style={{background:C.black, borderRadius:12, padding:"22px 26px"}}>
        <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:6}}>
          <div style={{width:6, height:6, borderRadius:3, background:C.accent}} />
          <span style={{fontFamily:B, fontSize:11, fontWeight:600, letterSpacing:"0.08em", color:C.accent, textTransform:"uppercase"}}>AI Employee Layer — Operates on Layers 1–4</span>
        </div>
        <p style={{fontFamily:B, fontSize:12, color:"rgba(255,255,255,0.5)", lineHeight:1.6, margin:"0 0 16px"}}>
          Each employee reads from the platform layers and orchestrates actions within its domain. The platform provides the data and intelligence; the employees make decisions and execute.
        </p>
        <div style={{display:"grid", gap:10}}>
          {employees.map((emp,i)=>(
            <div key={i} style={{background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:10, padding:"16px 20px", borderLeft:`3px solid ${emp.color}`}}>
              <div style={{fontFamily:H, fontSize:15, color:"#fff", marginBottom:6}}>{emp.name}</div>
              <div style={{marginBottom:8}}>
                <span style={{fontFamily:B, fontSize:9, fontWeight:600, color:"rgba(255,255,255,0.35)", textTransform:"uppercase", letterSpacing:"0.06em"}}>Reads from: </span>

              <div style={{fontFamily:B, fontSize:12, color:"rgba(255,255,255,0.6)", lineHeight:1.55}}>{emp.does}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{marginTop:16, background:C.sf, borderRadius:10, padding:"14px 18px", border:`1px solid ${C.bd}`, display:"flex", alignItems:"center", justifyContent:"space-between"}}>
        <div>
          <span style={{fontFamily:B, fontSize:13, fontWeight:600, color:C.black}}>Build for Brownsville first.</span>
          <span style={{fontFamily:B, fontSize:13, color:C.gray, marginLeft:8}}>Franchise architecture comes after the single-location system proves out.</span>
        </div>
        <Tag color={C.green}>Code-first</Tag>
      </div>
    </div>
  );
}

  const [view, setView] = useState("overview");

  return (
    <div style={{background:C.bg2, minHeight:"100vh", fontFamily:B}}>
      <div style={{background:C.bg, borderBottom:`1px solid ${C.bd}`, padding:"16px 32px", display:"flex", alignItems:"center"}}>
        <div style={{display:"flex", alignItems:"center", gap:10}}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="3" height="16" rx="1.5" fill={C.black}/><rect x="7" y="7" width="3" height="10" rx="1.5" fill={C.black}/><rect x="12" y="2" width="3" height="20" rx="1.5" fill={C.black}/><rect x="17" y="6" width="3" height="12" rx="1.5" fill={C.black}/></svg>
          <span style={{fontFamily:B, fontSize:16, fontWeight:700, color:C.black}}>Supernal</span>
        </div>
        <div style={{margin:"0 24px", height:20, width:1, background:C.bd}} />
        <div>
          <div style={{fontFamily:H, fontSize:17, color:C.black}}>Brownsville Preparatory Institute</div>
          <div style={{fontFamily:B, fontSize:11, color:C.gl}}>Post-Discovery Architecture · March 2026</div>
        </div>
        <div style={{marginLeft:"auto", display:"flex", gap:2, background:C.sf, borderRadius:10, padding:3}}>
          {views.map(v=>(
            <button key={v.id} onClick={()=>setView(v.id)} style={{background:view===v.id?C.bg:"transparent", border:view===v.id?`1px solid ${C.bd}`:"1px solid transparent", borderRadius:8, cursor:"pointer", padding:"8px 16px", color:view===v.id?C.black:C.gl, fontSize:12, fontWeight:500, fontFamily:B, boxShadow:view===v.id?"0 1px 3px rgba(0,0,0,0.04)":"none", transition:"all 0.1s"}}>{v.l}</button>

      <div style={{padding:"24px 32px", maxWidth:960, margin:"0 auto"}}>

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
